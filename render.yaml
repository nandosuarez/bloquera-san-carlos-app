services:
  - type: web
    name: bloquera-san-carlos-app
    runtime: node
    plan: starter
    region: virginia
    buildCommand: npm ci --include=dev && npm run build
    preDeployCommand: npm run db:setup:render
    startCommand: npm run start:render
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
      - key: TZ
        value: America/Bogota
      - key: DATABASE_URL
        fromDatabase:
          name: bloquera-san-carlos-db
          property: connectionString
      - key: POSTGRES_SSL
        value: "false"
      - key: SESSION_SECRET
        generateValue: true
      - key: SESSION_SECURE
        value: "true"
      - key: ADMIN_NAME
        value: Administrador Bloquera
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_EMAIL
        value: admin@bloquerasancarlos.com
      - key: ADMIN_PASSWORD
        sync: false
      - key: CUENTI_API_BASE_URL
        value: https://integrator-apps-api-dok.cuenti.co/api
      - key: CUENTI_COMPANY_ID
        value: "7760"
      - key: CUENTI_API_TOKEN
        sync: false
      - key: CUENTI_BRANCH_ID
        sync: false
      - key: CUENTI_ANALYTICS_START_DATE
        value: "2026-01-01"
      - key: CUENTI_ANALYTICS_OVERLAP_DAYS
        value: "7"
      - key: CUENTI_ANALYTICS_PAGE_SIZE
        value: "100"
      - key: CUENTI_ANALYTICS_MAX_PAGES
        value: "1"
      - key: CUENTI_ANALYTICS_CONCURRENCY
        value: "5"
      - key: CUENTI_AUTO_SYNC_ENABLED
        value: "true"
      - key: CUENTI_AUTO_SYNC_INTERVAL_MINUTES
        value: "60"
      - key: CUENTI_WAREHOUSE_ID
        sync: false
      - key: CUENTI_SELLER_ID
        sync: false
      - key: CUENTI_EMPLOYEE_ID
        sync: false
      - key: CUENTI_CONSECUTIVE_ID
        sync: false

databases:
  - name: bloquera-san-carlos-db
    databaseName: bloquera_san_carlos
    user: bloquera_admin
    postgresMajorVersion: "17"
    plan: basic-256mb
    region: virginia
    diskSizeGB: 1
    ipAllowList: []
